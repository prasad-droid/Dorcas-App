<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: transparent; }
        .icon-container { width: 1024px; height: 1024px; background: #2563eb; display: flex; justify-content: center; align-items: center; border-radius: 20%; overflow: hidden; }
        svg { width: 800px; height: 800px; color: white; }
    </style>
</head>
<body>
    <div class="icon-container">
        <svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <mask id="logoMask">
                <rect width="240" height="240" fill="white" />
                <path d="M-20 220 L135 90" stroke="black" stroke-width="42" stroke-linecap="butt" />
                <circle cx="135" cy="90" r="38" fill="black" />
                <circle cx="135" cy="90" r="18" fill="white" />
                <polygon points="135,90 200,45 200,135" fill="white" />
                <rect x="115" y="150" width="36" height="60" rx="8" fill="black" />
            </mask>
            <g mask="url(#logoMask)">
                <path d="M120 20 L220 100 H190 V210 H50 V100 H20 L120 20Z" fill="currentColor" />
            </g>
            <circle cx="140" cy="180" r="4" fill="currentColor" />
        </svg>
    </div>
</body>
</html>
